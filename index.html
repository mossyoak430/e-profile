<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanda Simpson</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://kit.fontawesome.com/ea3b4a6298.js" crossorigin="anonymous"></script>
</head>

<body>
    <section id="about-me">
        <nav>
        <div class="personal__logo">Amanda Simpson</div>
        <ul class="nav__link--list">
            <li>
                <a href="" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Languages</a>
            </li>
            <li>
                <a href="" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Project</a>
            </li>
            <li>
                <a href="" class="
                nav__link--anchor
                nav__link--anchor-primary
                ">Contact</a>
            </li>
        </ul>
      </nav>
      <div class="flex flex-1">
        <div class="about-me__info row"> 
            <div class="about-me__info--container">
                <figure class="about-me__picture--mask">
                    <img src="./assets/images/lbl.png" class="about-me__picture" alt="Amanda Simpson" class="about-me__info--image">
                </figure>
                <h1 class="about-me__info-title">
                    Hey! I'm <span class="text--purple">Amanda Simpson</span>
                </h1>  
                <p class="about-me__info--para">
                    Some <strong class="text--purple">really cool </strong> information 
                    about me.
                </p>
                <div class="about-me__links">
                    <a href="" class="about-me__link>
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                     <a href="" class="about-me__link>
                        <i class="fa-brands fa-github"></i>
                    </a> 
                    <a href="" class="about-me__link>
                        <i class="far fa-envelope"></i>
                    </a>
                     <a href="" class="about-me__link>
                        <i class="fas fa-file-pdf"></i>
                    </a>
                </div>
            </div>                     
        </div>
      </div>
    </section>
</body>

</html>
